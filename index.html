<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GoalStream · FIFA World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#03070f;
  --abyss:#060d1a;
  --deep:#0a1628;
  --mid:#0f1f35;

  --g-glass:rgba(255,255,255,0.04);
  --g-glass-md:rgba(255,255,255,0.07);
  --g-glass-hi:rgba(255,255,255,0.11);
  --g-blur:blur(24px) saturate(160%);
  --g-blur-sm:blur(14px) saturate(140%);

  --border:rgba(255,255,255,0.08);
  --border-md:rgba(255,255,255,0.14);
  --border-hi:rgba(255,255,255,0.22);

  --gold:#F7C948;
  --gold2:#E5B62A;
  --gold3:#C99B1A;
  --gold-glow:rgba(247,201,72,0.22);
  --gold-glow2:rgba(247,201,72,0.08);

  --crimson:#E8334A;
  --crimson-glow:rgba(232,51,74,0.25);
  --emerald:#22C55E;
  --emerald-glow:rgba(34,197,94,0.2);
  --sky:#38BDF8;

  --text:#F0F6FF;
  --text-2:rgba(240,246,255,0.65);
  --text-3:rgba(240,246,255,0.38);
  --text-4:rgba(240,246,255,0.2);

  --font:'Outfit',sans-serif;
  --mono:'JetBrains Mono',monospace;

  --r:16px;
  --r-sm:10px;
  --r-xs:6px;
  --sidebar:288px;
  --drawer:300px;
  --hdr:62px;
}

html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}

/* ── BG LAYERS ── */
#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 100% 60% at -10% 0%,rgba(30,80,180,0.22) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 110% 100%,rgba(247,201,72,0.10) 0%,transparent 50%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(232,51,74,0.05) 0%,transparent 55%),
    linear-gradient(170deg,#060d1a 0%,#03070f 100%);
}
#bg-canvas::after{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 63px,rgba(255,255,255,0.018) 64px),
    repeating-linear-gradient(90deg,transparent,transparent 63px,rgba(255,255,255,0.013) 64px);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(247,201,72,0.25);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:rgba(247,201,72,0.5);}

/* ── SHELL ── */
#shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

/* ══ HEADER ══ */
#hdr{
  height:var(--hdr);flex-shrink:0;
  display:flex;align-items:center;gap:12px;padding:0 18px;
  background:rgba(6,13,26,0.82);
  backdrop-filter:var(--g-blur);
  -webkit-backdrop-filter:var(--g-blur);
  border-bottom:1px solid var(--border);
  position:relative;z-index:60;
}
#hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold) 60%,transparent 100%);
  opacity:0.3;
}

.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;}
.logo-mark{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(145deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,0.3);
  font-size:17px;font-weight:900;color:#000;letter-spacing:-0.02em;
  font-family:var(--font);
}
.logo-text{line-height:1;}
.logo-name{font-size:19px;font-weight:800;letter-spacing:-0.03em;color:var(--text);}
.logo-name em{color:var(--gold);font-style:normal;}
.logo-sub{font-size:9px;font-weight:500;letter-spacing:0.18em;color:var(--text-3);text-transform:uppercase;margin-top:1px;}

/* Ticker */
#ticker-shell{
  flex:1;min-width:0;height:32px;
  border-radius:8px;overflow:hidden;position:relative;
  background:rgba(255,255,255,0.025);border:1px solid var(--border);
  display:none;
}
@media(min-width:720px){#ticker-shell{display:flex;align-items:center;}}
.ticker-badge{
  position:absolute;left:0;top:0;bottom:0;z-index:2;
  display:flex;align-items:center;gap:6px;padding:0 12px;
  background:linear-gradient(90deg,var(--abyss) 75%,transparent);
}
.live-pip{
  width:7px;height:7px;border-radius:50%;
  background:var(--crimson);
  box-shadow:0 0 8px var(--crimson);
  animation:pip 1.4s ease-in-out infinite;
}
@keyframes pip{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.65);}}
.ticker-badge span{font-size:9px;font-weight:700;letter-spacing:0.18em;color:var(--crimson);}
.ticker-track{padding-left:88px;white-space:nowrap;display:flex;align-items:center;animation:tick 45s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes tick{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* Nav */
.nav-group{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:3px;flex-shrink:0;}
.nav-btn{
  font-size:11px;font-weight:700;letter-spacing:0.06em;
  padding:6px 14px;border-radius:8px;border:none;
  background:transparent;color:var(--text-3);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.nav-btn.on{
  background:linear-gradient(145deg,rgba(247,201,72,0.18),rgba(247,201,72,0.07));
  color:var(--gold);border:1px solid rgba(247,201,72,0.28);
  box-shadow:0 0 14px var(--gold-glow2),inset 0 1px 0 rgba(255,255,255,0.06);
}
.nav-btn:hover:not(.on){background:rgba(255,255,255,0.05);color:var(--text-2);}

/* Hamburger */
#mob-menu-btn{display:none;}
@media(max-width:860px){#mob-menu-btn{display:flex;}}

/* ══ BODY ══ */
#body-row{flex:1;display:flex;overflow:hidden;position:relative;}

/* ══ SIDEBAR ══ */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(6,13,26,0.78);
  backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);
  border-right:1px solid var(--border);
  position:relative;z-index:30;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
@media(max-width:860px){
  #sidebar{position:absolute;top:0;left:0;bottom:0;z-index:110;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
}
.sidebar-hd{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sidebar-top h2{font-size:11px;font-weight:700;letter-spacing:0.15em;color:var(--text-3);display:flex;align-items:center;gap:6px;}
.sidebar-top h2 i{color:var(--gold);font-size:10px;}
.ch-badge{
  font-size:9px;font-weight:700;letter-spacing:0.1em;
  padding:2px 8px;border-radius:10px;
  background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.22);color:var(--gold);
}
.search-wrap{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:7px 11px;margin-bottom:10px;
  transition:border-color .2s;
}
.search-wrap:focus-within{border-color:rgba(247,201,72,0.35);}
.search-wrap i{color:var(--text-4);font-size:11px;}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:12px;width:100%;}
.search-wrap input::placeholder{color:var(--text-4);}
.cat-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:1px;}
.cat-row::-webkit-scrollbar{height:2px;}
.cat-pill{
  font-size:10px;font-weight:600;letter-spacing:0.06em;
  padding:3px 11px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-3);cursor:pointer;white-space:nowrap;transition:all .18s;
}
.cat-pill:hover{border-color:var(--border-md);color:var(--text-2);}
.cat-pill.on{background:rgba(247,201,72,0.12);border-color:rgba(247,201,72,0.35);color:var(--gold);}
#ch-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:3px;}

/* Channel item */
.ch-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 9px;border-radius:var(--r-sm);
  border:1px solid transparent;cursor:pointer;
  transition:all .18s;position:relative;overflow:hidden;
}
.ch-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold);opacity:0;border-radius:0 3px 3px 0;transition:opacity .18s;
}
.ch-row:hover{background:var(--g-glass);border-color:var(--border);}
.ch-row.on{background:rgba(247,201,72,0.07);border-color:rgba(247,201,72,0.22);}
.ch-row.on::before{opacity:1;}
.ch-thumb{
  width:36px;height:36px;flex-shrink:0;border-radius:9px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.ch-thumb img{width:100%;height:100%;object-fit:contain;padding:3px;}
.ch-thumb-ph{color:var(--gold);font-size:13px;}
.ch-meta{flex:1;min-width:0;}
.ch-nm{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .18s;}
.ch-row.on .ch-nm{color:var(--gold);}
.ch-cat{font-size:9px;font-weight:500;letter-spacing:0.1em;color:var(--text-4);text-transform:uppercase;margin-top:1px;}
.ch-side{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ch-num{font-family:var(--mono);font-size:9px;color:var(--text-4);}
.ch-dot{width:5px;height:5px;border-radius:50%;}
.ch-dot.live{background:var(--crimson);box-shadow:0 0 6px var(--crimson);animation:pip 1.4s ease-in-out infinite;}
.ch-dot.off{background:rgba(255,255,255,0.1);}

/* ══ CENTER ══ */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TV PANEL */
#tv-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:1060px){#tv-panel{flex-direction:row;}}

/* Player zone */
#player-zone{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;overflow:hidden;min-width:0;}

/* THE PLAYER */
#player-wrap{
  flex:1;position:relative;border-radius:var(--r);overflow:hidden;
  background:#000;min-height:200px;
  box-shadow:0 0 0 1px var(--border),0 24px 64px rgba(0,0,0,0.7),0 0 60px rgba(30,80,180,0.06);
}
#player-wrap::before{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;border-radius:var(--r);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05),inset 0 1px 0 rgba(255,255,255,0.08);
}

#player-video,#player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:var(--r);}
#player-iframe{display:none;}

/* Overlay */
#player-overlay{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(3,7,15,0.88);border-radius:var(--r);
  transition:opacity .35s;
}
.loader-ring{
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(247,201,72,0.15);
  border-top:2px solid var(--gold);
  animation:spin .85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#overlay-msg{
  font-size:11px;font-weight:700;letter-spacing:0.14em;
  color:var(--gold);text-align:center;max-width:200px;line-height:1.5;
}

/* Hover controls bar */
#ctrl-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  padding:14px 16px 16px;
  background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  opacity:0;transform:translateY(6px);
  transition:opacity .25s,transform .25s;
}
#player-wrap:hover #ctrl-bar,#player-wrap:focus-within #ctrl-bar{opacity:1;transform:translateY(0);}

.ctrl-cluster{display:flex;align-items:center;gap:8px;}
.icn-btn{
  width:34px;height:34px;border-radius:9px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);color:var(--text);
  transition:all .18s;
}
.icn-btn:hover{background:rgba(247,201,72,0.2);border-color:rgba(247,201,72,0.5);color:var(--gold);}
.icn-btn.active-state{background:rgba(232,51,74,0.15);border-color:rgba(232,51,74,0.4);color:var(--crimson);}

.vol-range{
  -webkit-appearance:none;width:84px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.18);outline:none;cursor:pointer;accent-color:var(--gold);
}
.vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 8px var(--gold-glow);}

.live-tag{display:flex;align-items:center;gap:6px;}
.live-tag span{font-size:10px;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.5);}

/* Fullscreen helper */
#player-wrap:-webkit-full-screen{width:100vw!important;height:100vh!important;border-radius:0!important;}
#player-wrap:-moz-full-screen{width:100vw!important;height:100vh!important;border-radius:0!important;}
#player-wrap:fullscreen{width:100vw!important;height:100vh!important;border-radius:0!important;}
#player-video:-webkit-full-screen,#player-iframe:-webkit-full-screen{width:100%!important;height:100%!important;}

/* Info bar */
#info-bar{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;flex-shrink:0;}

.now-card{
  display:flex;align-items:center;gap:10px;padding:9px 13px;
  border-radius:var(--r-sm);flex:1;min-width:170px;
  background:var(--g-glass);backdrop-filter:var(--g-blur-sm);-webkit-backdrop-filter:var(--g-blur-sm);
  border:1px solid var(--border);
  box-shadow:0 0 20px var(--gold-glow2),inset 0 1px 0 rgba(255,255,255,0.04);
}
.now-logo{
  width:34px;height:34px;border-radius:9px;overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;
}
.now-logo img{width:100%;height:100%;object-fit:contain;}
.now-lbl{font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--text-4);text-transform:uppercase;}
.now-name{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}

.stats-card{
  display:flex;align-items:center;gap:0;
  background:var(--g-glass);backdrop-filter:var(--g-blur-sm);-webkit-backdrop-filter:var(--g-blur-sm);
  border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;
}
.stat-seg{
  padding:9px 14px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-seg:last-child{border-right:none;}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--text-4);text-transform:uppercase;}
.stat-val{font-family:var(--mono);font-size:11px;font-weight:700;margin-top:2px;}

/* Inline match scroll (≤1059px) */
#inline-matches{border-top:1px solid var(--border);flex-shrink:0;}
@media(min-width:1060px){#inline-matches{display:none;}}
#inline-inner{display:flex;gap:7px;padding:9px 12px;overflow-x:auto;}
#inline-inner::-webkit-scrollbar{height:2px;}
.mini-card{
  flex-shrink:0;min-width:150px;padding:8px 11px;border-radius:var(--r-sm);
  background:var(--g-glass);border:1px solid var(--border);
}
.mini-sc{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--gold);text-align:center;}
.mini-teams{font-size:9px;color:var(--text-3);text-align:center;margin-top:2px;}
.mini-st{font-size:9px;font-weight:700;letter-spacing:0.1em;text-align:center;margin-top:3px;}
.mini-st.live{color:var(--crimson);}
.mini-st.done{color:var(--emerald);}
.mini-st.pre{color:var(--text-4);}

/* ══ RIGHT DRAWER ══ */
#drawer{
  width:var(--drawer);flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(6,13,26,0.72);
  backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);
  border-left:1px solid var(--border);
}
@media(max-width:1059px){#drawer{display:none;}}
.drawer-hd{
  padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.drawer-hd h3{font-size:12px;font-weight:700;letter-spacing:0.14em;color:var(--gold);display:flex;align-items:center;gap:7px;}
.refresh-indicator{
  font-family:var(--mono);font-size:9px;color:var(--text-4);
  display:flex;align-items:center;gap:4px;
}
.refresh-dot{width:5px;height:5px;border-radius:50%;background:var(--emerald);animation:pip 1.4s ease-in-out infinite;}
#drawer-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;}

/* Match card */
.match-card{
  border-radius:var(--r-sm);
  background:var(--g-glass);
  border:1px solid var(--border);
  padding:10px 11px;
  transition:border-color .18s,background .18s;
  cursor:default;
}
.match-card:hover{border-color:var(--border-md);background:var(--g-glass-md);}
.match-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.match-comp{font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--text-4);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.match-pill{font-size:8px;font-weight:800;letter-spacing:0.1em;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.match-pill.live{background:rgba(232,51,74,0.14);color:var(--crimson);border:1px solid rgba(232,51,74,0.28);animation:pip 1.4s ease-in-out infinite;}
.match-pill.done{background:rgba(34,197,94,0.08);color:var(--emerald);border:1px solid rgba(34,197,94,0.2);}
.match-pill.pre{background:rgba(255,255,255,0.04);color:var(--text-3);border:1px solid var(--border);}
.match-body{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.match-team{display:flex;flex-direction:column;align-items:center;gap:5px;width:36%;}
.match-team img{width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));}
.match-team-nm{font-size:10px;font-weight:600;text-align:center;line-height:1.25;color:var(--text-2);}
.match-score{
  font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold);
  background:rgba(247,201,72,0.07);border:1px solid rgba(247,201,72,0.16);
  border-radius:var(--r-xs);padding:5px 13px;min-width:64px;text-align:center;
}

/* ══ HUB VIEW ══ */
#hub-panel{flex:1;overflow-y:auto;padding:14px;display:none;}
#hub-panel.on{display:block;}
.hub-title{font-size:20px;font-weight:800;letter-spacing:-0.02em;color:var(--gold);display:flex;align-items:center;gap:9px;margin-bottom:16px;}
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;max-width:1200px;margin:0 auto;}
.grp-card{
  border-radius:var(--r);
  background:var(--g-glass);
  backdrop-filter:var(--g-blur-sm);-webkit-backdrop-filter:var(--g-blur-sm);
  border:1px solid var(--border);padding:14px;
}
.grp-nm{font-size:12px;font-weight:800;letter-spacing:0.1em;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.grp-nm::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold-glow);}
.grp-table{width:100%;border-collapse:collapse;}
.grp-table th{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--text-4);text-transform:uppercase;padding:3px 4px;}
.grp-table th:first-child{text-align:left;}
.grp-table th:not(:first-child){text-align:right;}
.grp-table td{font-size:11px;font-weight:500;padding:5px 4px;border-top:1px solid rgba(255,255,255,0.05);}
.grp-table td.pos{color:var(--text-4);font-family:var(--mono);font-size:9px;width:18px;}
.grp-table td.pts{color:var(--gold);font-weight:800;font-family:var(--mono);font-size:13px;text-align:right;}
.grp-table td:not(.pos):not(.pts){text-align:right;color:var(--text-3);}
.team-cell{display:flex;align-items:center;gap:7px;}
.team-cell img{width:16px;height:16px;object-fit:contain;}
.team-cell span{font-size:11px;font-weight:600;color:var(--text-2);}

/* ══ MOBILE NAV ══ */
#mob-nav{
  display:none;height:54px;
  background:rgba(6,13,26,0.92);
  backdrop-filter:var(--g-blur);-webkit-backdrop-filter:var(--g-blur);
  border-top:1px solid var(--border);flex-shrink:0;
  position:relative;z-index:60;
}
@media(max-width:860px){#mob-nav{display:flex;align-items:stretch;}}
.mob-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;
  color:var(--text-4);cursor:pointer;transition:all .18s;
  font-size:9px;font-family:var(--font);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
}
.mob-btn i{font-size:17px;}
.mob-btn.on{color:var(--gold);}
.mob-btn.on i{filter:drop-shadow(0 0 6px var(--gold));}

/* ══ MISC ══ */
#mob-scrim{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.55);}
@media(max-width:860px){#mob-scrim.on{display:block;}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 16px;text-align:center;}
.empty i{font-size:26px;color:var(--text-4);}
.empty p{font-size:10px;font-weight:600;letter-spacing:0.14em;color:var(--text-4);}

/* highlight first group */
.grp-table tr:first-child td{color:var(--text);}
</style>
</head>
<body>
<div id="bg-canvas"></div>
<div id="shell">

<!-- HEADER -->
<header id="hdr">
  <button class="icn-btn" id="mob-menu-btn" onclick="toggleSidebar()" aria-label="Channels">
    <i class="fa-solid fa-bars-staggered"></i>
  </button>
  <a class="logo" href="#">
    <div class="logo-mark">GS</div>
    <div class="logo-text">
      <div class="logo-name"><em>Goal</em>Stream</div>
      <div class="logo-sub">FIFA World Cup 2026</div>
    </div>
  </a>

  <!-- Ticker -->
  <div id="ticker-shell">
    <div class="ticker-badge"><div class="live-pip"></div><span>LIVE</span></div>
    <div class="ticker-track" id="ticker-inner">
      <span style="font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--text-4);padding:0 20px;">CONNECTING TO LIVE DATA…</span>
    </div>
  </div>

  <div class="nav-group">
    <button class="nav-btn on" id="tab-watch" onclick="setView('watch')"><i class="fa-solid fa-circle-play"></i> Watch</button>
    <button class="nav-btn" id="tab-hub" onclick="setView('hub')"><i class="fa-solid fa-trophy"></i> Standings</button>
  </div>
</header>

<!-- BODY -->
<div id="body-row">
  <div id="mob-scrim" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-hd">
      <div class="sidebar-top">
        <h2><i class="fa-solid fa-tower-broadcast"></i> CHANNELS</h2>
        <span class="ch-badge" id="ch-count">0</span>
      </div>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="ch-search" placeholder="Search channels…" oninput="drawChannels()">
      </div>
      <div class="cat-row" id="cat-row"></div>
    </div>
    <div id="ch-list"></div>
  </aside>

  <!-- CENTER -->
  <div id="center">

    <!-- TV PANEL -->
    <div id="tv-panel">
      <div id="player-zone">

        <!-- Player -->
        <div id="player-wrap">
          <video id="player-video" controls autoplay playsinline></video>
          <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" scrolling="no"></iframe>

          <!-- Overlay -->
          <div id="player-overlay">
            <div class="loader-ring"></div>
            <div id="overlay-msg">CONNECTING TO STREAM</div>
          </div>

          <!-- Controls -->
          <div id="ctrl-bar">
            <div class="ctrl-cluster">
              <button class="icn-btn" id="btn-mute" onclick="toggleMute()"><i class="fa-solid fa-volume-high"></i></button>
              <input type="range" class="vol-range" id="vol-range" min="0" max="1" step="0.04" value="0.85" oninput="setVol(this.value)">
            </div>
            <div class="live-tag">
              <div class="live-pip"></div>
              <span>LIVE BROADCAST</span>
            </div>
            <div class="ctrl-cluster">
              <button class="icn-btn" id="btn-fs" onclick="doFullscreen()" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
            </div>
          </div>
        </div><!-- /player-wrap -->

        <!-- Info bar -->
        <div id="info-bar">
          <div class="now-card">
            <div class="now-logo" id="now-logo"><i class="fa-solid fa-satellite-dish" style="color:var(--gold);font-size:14px;"></i></div>
            <div>
              <div class="now-lbl">Now Streaming</div>
              <div class="now-name" id="now-name">TRT — FIFA 2026</div>
            </div>
          </div>
          <div class="stats-card">
            <div class="stat-seg">
              <div class="stat-lbl">Proxy</div>
              <div class="stat-val" id="s-proxy" style="color:var(--text-4);">OFF</div>
            </div>
            <div class="stat-seg">
              <div class="stat-lbl">API</div>
              <div class="stat-val" id="s-api" style="color:var(--text-4);">—</div>
            </div>
            <div class="stat-seg">
              <div class="stat-lbl">Refresh</div>
              <div class="stat-val" id="s-refresh" style="color:var(--gold);font-size:10px;">5s</div>
            </div>
          </div>
        </div>
      </div><!-- /player-zone -->

      <!-- Inline matches (tablet/mobile) -->
      <div id="inline-matches">
        <div id="inline-inner">
          <div class="empty" style="min-width:100%;"><i class="fa-solid fa-futbol"></i><p>FETCHING MATCHES…</p></div>
        </div>
      </div>

      <!-- RIGHT DRAWER (desktop) -->
      <aside id="drawer">
        <div class="drawer-hd">
          <h3><i class="fa-solid fa-futbol"></i> LIVE MATCHES</h3>
          <div class="refresh-indicator"><div class="refresh-dot"></div><span id="refresh-label">5s</span></div>
        </div>
        <div id="drawer-list">
          <div class="empty"><i class="fa-solid fa-satellite-dish"></i><p>CONNECTING…</p></div>
        </div>
      </aside>
    </div><!-- /tv-panel -->

    <!-- HUB PANEL -->
    <div id="hub-panel">
      <div class="hub-title"><i class="fa-solid fa-trophy"></i> World Cup 2026 Standings</div>
      <div class="hub-grid" id="hub-grid">
        <div class="empty" style="grid-column:1/-1;"><i class="fa-solid fa-circle-notch fa-spin"></i><p>LOADING…</p></div>
      </div>
    </div>

  </div><!-- /center -->
</div><!-- /body-row -->

<!-- MOBILE NAV -->
<nav id="mob-nav">
  <button class="mob-btn on" id="mob-watch" onclick="mobTab('watch')"><i class="fa-solid fa-circle-play"></i>Watch</button>
  <button class="mob-btn" id="mob-chs" onclick="toggleSidebar()"><i class="fa-solid fa-tower-broadcast"></i>Channels</button>
  <button class="mob-btn" id="mob-hub" onclick="mobTab('hub')"><i class="fa-solid fa-trophy"></i>Standings</button>
</nav>

</div><!-- /shell -->

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CHANNELS = [
  {id:'trt',name:'TRT — FIFA 2026',cat:'Sports',logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/TRT_World_logo.svg/240px-TRT_World_logo.svg.png',num:'00',embed:true,url:'https://veotest.bbvplayline1a.com/video.html?url=https://rxne77juptdeyke3tytvgqwyh.medya.trt.com.tr/master.m3u8'},
  {id:'caze',name:'Caze TV Brasil',cat:'Sports',logo:'https://stream.codecloud.bd/uploads/logos/logo_6a2a39c4ac184.png',num:'01',url:'https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8'},
  {id:'fifafr',name:'FIFA+ French',cat:'Sports',logo:'https://i.ibb.co.com/vnbkF0r/fifa-world-cup-2026-logo-png-seeklogo-665644.png',num:'02',url:'https://37b4c228.wurl.com/manifest/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWZyX0ZJRkFQbHVzRnJlbmNoX0hMUw/6f5437c5-e015-4754-8476-c8c6d27d3a55/1.m3u8'},
  {id:'bein',name:'Bein Sports XTRA',cat:'Sports',logo:'https://imglink.cc/cdn/kIiut6WBq0.jpg',num:'03',url:'https://amg01334-amg01334c2-freelivesports-emea-6791.playouts.now.amagi.tv/playlist/amg01334-beinxtra-beinxtrausapp-freelivesportsemea/playlist.m3u8'},
  {id:'fifaes',name:'FIFA+ Argentina',cat:'Sports',logo:'https://i.ibb.co.com/vnbkF0r/fifa-world-cup-2026-logo-png-seeklogo-665644.png',num:'04',url:'https://6c849fb3.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/TEctbXhfRklGQVBsdXNTcGFuaXNoLTFfSExT/playlist.m3u8'},
  {id:'fifaen',name:'FIFA+ English',cat:'Sports',logo:'https://stream.codecloud.bd/uploads/logos/logo_6a2a34c03f4a.png',num:'05',url:'https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8'},
  {id:'bbc',name:'BBC Earth',cat:'Documentary',logo:'https://imglink.cc/cdn/eEZmseF3Tb.jpg',num:'06',url:'https://amg00793-amg00793c6-xumo-us-2669.playouts.now.amagi.tv/BBCStudios-BBCEarthA-hls/playlist540p.m3u8'},
  {id:'test',name:'Test Feed',cat:'Test',logo:'',num:'07',url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8'}
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let activeCh = null, hlsInst = null;
let selCat = 'All', sidebarOpen = false, curView = 'watch';
let liveEvents = [], standings = [];

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
window.onload = () => {
  buildResponsive();
  buildCats();
  drawChannels();
  setTimeout(() => playChannel('trt'), 300);

  fetchScores();
  fetchStandings();
  // 5-second refresh for scores
  setInterval(fetchScores, 5000);
  // Standings refresh every 30s
  setInterval(fetchStandings, 30000);

  window.addEventListener('resize', buildResponsive);

  // Countdown display
  let cd = 5;
  setInterval(() => {
    cd = cd <= 1 ? 5 : cd - 1;
    const el1 = document.getElementById('s-refresh');
    const el2 = document.getElementById('refresh-label');
    if(el1) el1.textContent = cd + 's';
    if(el2) el2.textContent = cd + 's';
  }, 1000);
};

function buildResponsive() {
  const mob = window.innerWidth <= 860;
  document.getElementById('mob-menu-btn').style.display = mob ? 'flex' : 'none';
}

// ═══════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════
function setView(v) {
  curView = v;
  const tvp = document.getElementById('tv-panel');
  const hub = document.getElementById('hub-panel');
  const tw = document.getElementById('tab-watch');
  const th = document.getElementById('tab-hub');
  if(v === 'watch') {
    tvp.style.display = ''; hub.classList.remove('on');
    tw.classList.add('on'); th.classList.remove('on');
  } else {
    tvp.style.display = 'none'; hub.classList.add('on');
    tw.classList.remove('on'); th.classList.add('on');
    renderHub();
  }
}
function mobTab(v) {
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('on'));
  if(v === 'watch') { document.getElementById('mob-watch').classList.add('on'); setView('watch'); }
  else { document.getElementById('mob-hub').classList.add('on'); setView('hub'); }
  if(sidebarOpen) closeSidebar();
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function toggleSidebar() { sidebarOpen ? closeSidebar() : openSidebar(); }
function openSidebar() {
  sidebarOpen = true;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-scrim').classList.add('on');
  document.getElementById('mob-chs').classList.add('on');
}
function closeSidebar() {
  sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-scrim').classList.remove('on');
  document.getElementById('mob-chs').classList.remove('on');
}

// ═══════════════════════════════════════════
// CHANNELS
// ═══════════════════════════════════════════
function buildCats() {
  const cats = ['All', ...new Set(CHANNELS.map(c => c.cat))];
  document.getElementById('cat-row').innerHTML = cats.map(c => `
    <button class="cat-pill ${c===selCat?'on':''}" onclick="setCat('${c}')">${c}</button>
  `).join('');
}
function setCat(c) { selCat = c; buildCats(); drawChannels(); }
function drawChannels() {
  const q = document.getElementById('ch-search').value.toLowerCase();
  const filt = CHANNELS.filter(c => {
    const mc = selCat==='All' || c.cat===selCat;
    const ms = c.name.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q);
    return mc && ms;
  });
  document.getElementById('ch-count').textContent = filt.length;
  document.getElementById('ch-list').innerHTML = filt.length ? filt.map(c => `
    <div class="ch-row ${c.id===activeCh?'on':''}" onclick="playChannel('${c.id}');if(sidebarOpen)closeSidebar();">
      <div class="ch-thumb">
        ${c.logo ? `<img src="${c.logo}" alt="" onerror="this.parentElement.innerHTML='<i class=ch-thumb-ph></i>'">` : '<i class="fa-solid fa-tv ch-thumb-ph"></i>'}
      </div>
      <div class="ch-meta">
        <div class="ch-nm">${c.name}</div>
        <div class="ch-cat">${c.cat}</div>
      </div>
      <div class="ch-side">
        <span class="ch-num">${c.num}</span>
        <span class="ch-dot ${c.id===activeCh?'live':'off'}"></span>
      </div>
    </div>
  `).join('') : '<div class="empty"><i class="fa-solid fa-magnifying-glass"></i><p>NO RESULTS</p></div>';
}

// ═══════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════
function playChannel(id, useProxy=false) {
  const ch = CHANNELS.find(c=>c.id===id);
  if(!ch) return;
  activeCh = id;
  drawChannels();

  // Info bar
  const nl = document.getElementById('now-logo');
  nl.innerHTML = ch.logo ? `<img src="${ch.logo}" alt="">` : '<i class="fa-solid fa-satellite-dish" style="color:var(--gold);font-size:14px;"></i>';
  document.getElementById('now-name').textContent = ch.name;

  const overlay = document.getElementById('player-overlay');
  const msg     = document.getElementById('overlay-msg');
  const sp      = document.getElementById('s-proxy');
  const video   = document.getElementById('player-video');
  const iframe  = document.getElementById('player-iframe');

  overlay.style.opacity = '1'; overlay.style.pointerEvents = 'auto';
  msg.textContent = useProxy ? 'REROUTING VIA PROXY…' : 'CONNECTING TO STREAM';
  sp.textContent = useProxy ? 'ON' : 'OFF';
  sp.style.color = useProxy ? 'var(--gold)' : 'var(--text-4)';

  if(hlsInst) { hlsInst.destroy(); hlsInst = null; }

  const hideOverlay = () => { overlay.style.opacity='0'; overlay.style.pointerEvents='none'; };

  // EMBED mode
  if(ch.embed) {
    video.style.display = 'none'; video.src = '';
    iframe.style.display = 'block';
    iframe.src = ch.url;
    setTimeout(hideOverlay, 2500);
    return;
  }

  // HLS mode
  iframe.style.display = 'none'; iframe.src = '';
  video.style.display = 'block';
  let url = useProxy ? 'https://corsproxy.io/?'+encodeURIComponent(ch.url) : ch.url;

  if(Hls.isSupported()) {
    hlsInst = new Hls({enableWorker:true,lowLatencyMode:true});
    hlsInst.loadSource(url);
    hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); hideOverlay(); });
    hlsInst.on(Hls.Events.ERROR, (e,d) => {
      if(d.fatal) {
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR && !useProxy) {
          msg.textContent = 'CORS BLOCK — REROUTING…';
          setTimeout(()=>playChannel(id,true),1200);
        } else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) {
          hlsInst.recoverMediaError();
        } else {
          msg.textContent = 'STREAM UNAVAILABLE';
        }
      }
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.onloadedmetadata = () => { video.play(); hideOverlay(); };
  }
}

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
function toggleMute() {
  const v = document.getElementById('player-video');
  const b = document.getElementById('btn-mute');
  v.muted = !v.muted;
  b.innerHTML = v.muted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
  if(v.muted) b.classList.add('active-state'); else b.classList.remove('active-state');
}
function setVol(val) {
  const v = document.getElementById('player-video');
  v.volume = val; v.muted = false;
  document.getElementById('btn-mute').innerHTML = '<i class="fa-solid fa-volume-high"></i>';
  document.getElementById('btn-mute').classList.remove('active-state');
}

// ═══════════════════════════════════════════
// FULLSCREEN — wraps the entire player-wrap
// ═══════════════════════════════════════════
function doFullscreen() {
  const wrap = document.getElementById('player-wrap');
  const activeEl = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;

  if(activeEl) {
    // Exit fullscreen
    const exitFn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
    if(exitFn) exitFn.call(document);
    document.getElementById('btn-fs').innerHTML = '<i class="fa-solid fa-expand"></i>';
  } else {
    // Enter fullscreen on the wrapper div
    const reqFn = wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.mozRequestFullScreen;
    if(reqFn) {
      reqFn.call(wrap).catch(()=>{
        // fallback: fullscreen the video itself
        const vid = document.getElementById('player-video');
        if(vid.requestFullscreen) vid.requestFullscreen();
        else if(vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
      });
      document.getElementById('btn-fs').innerHTML = '<i class="fa-solid fa-compress"></i>';
    }
  }
}

// Listen for fullscreen change to update icon
document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);
function updateFsIcon() {
  const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('btn-fs').innerHTML = inFs ? '<i class="fa-solid fa-compress"></i>' : '<i class="fa-solid fa-expand"></i>';
}

// ═══════════════════════════════════════════
// ESPN API — 5 second refresh
// ═══════════════════════════════════════════
async function fetchScores() {
  try {
    const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',{cache:'no-store'});
    if(!r.ok) throw 0;
    const d = await r.json();
    liveEvents = d.events || [];
    const sa = document.getElementById('s-api');
    sa.textContent = 'LIVE'; sa.style.color = 'var(--emerald)';
    renderTicker();
    renderDrawer();
    renderInline();
  } catch {
    const sa = document.getElementById('s-api');
    sa.textContent = 'ERR'; sa.style.color = 'var(--crimson)';
  }
}
async function fetchStandings() {
  try {
    const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings',{cache:'no-store'});
    if(!r.ok) return;
    const d = await r.json();
    standings = d.children || [];
    if(curView==='hub') renderHub();
  } catch {}
}

// Ticker
function renderTicker() {
  const el = document.getElementById('ticker-inner');
  if(!liveEvents.length) {
    el.innerHTML = '<span style="font-size:10px;font-weight:600;letter-spacing:0.12em;color:var(--text-4);padding:0 20px;">NO LIVE MATCHES DETECTED — WORLD CUP 2026</span>';
    return;
  }
  const html = liveEvents.map(ev => {
    const c=ev.competitions[0],t1=c.competitors[0],t2=c.competitors[1];
    const live=ev.status.type.state==='in';
    return `<span style="display:inline-flex;align-items:center;gap:9px;padding:0 18px;font-size:11px;font-weight:700;">
      <span style="color:var(--gold);letter-spacing:0.06em;">${ev.shortName}</span>
      <span style="color:var(--text-2);">${t1.team.abbreviation} <span style="color:var(--gold);font-size:14px;font-family:var(--mono);">${t1.score}–${t2.score}</span> ${t2.team.abbreviation}</span>
      <span style="color:${live?'var(--crimson)':'var(--text-4)'};">${ev.status.displayClock}</span>
    </span>`;
  }).join('<span style="color:rgba(255,255,255,0.12);padding:0 6px;">⬥</span>');
  el.innerHTML = html + '<span style="color:rgba(255,255,255,0.12);padding:0 6px;">⬥</span>' + html;
}

// Drawer
function renderDrawer() {
  const p = document.getElementById('drawer-list');
  if(!liveEvents.length) { p.innerHTML = '<div class="empty"><i class="fa-solid fa-futbol"></i><p>NO DATA / OFF-SEASON</p></div>'; return; }
  p.innerHTML = liveEvents.map(ev => {
    const c=ev.competitions[0],t1=c.competitors[0],t2=c.competitors[1];
    const st=ev.status.type.state;
    const cls=st==='in'?'live':st==='post'?'done':'pre';
    return `<div class="match-card">
      <div class="match-hd">
        <span class="match-comp">${ev.name}</span>
        <span class="match-pill ${cls}">${ev.status.type.shortDetail}</span>
      </div>
      <div class="match-body">
        <div class="match-team">
          <img src="${t1.team.logo||''}" alt="" onerror="this.style.display='none'">
          <div class="match-team-nm">${t1.team.shortDisplayName}</div>
        </div>
        <div class="match-score">${t1.score}–${t2.score}</div>
        <div class="match-team">
          <img src="${t2.team.logo||''}" alt="" onerror="this.style.display='none'">
          <div class="match-team-nm">${t2.team.shortDisplayName}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Inline
function renderInline() {
  const p = document.getElementById('inline-inner');
  if(!liveEvents.length) { p.innerHTML = '<div class="empty" style="min-width:100%;"><i class="fa-solid fa-futbol"></i><p>NO MATCHES</p></div>'; return; }
  p.innerHTML = liveEvents.map(ev => {
    const c=ev.competitions[0],t1=c.competitors[0],t2=c.competitors[1];
    const st=ev.status.type.state;
    const cls=st==='in'?'live':st==='post'?'done':'pre';
    return `<div class="mini-card">
      <div class="mini-sc">${t1.score}–${t2.score}</div>
      <div class="mini-teams">${t1.team.abbreviation} vs ${t2.team.abbreviation}</div>
      <div class="mini-st ${cls}">${ev.status.type.shortDetail}</div>
    </div>`;
  }).join('');
}

// Standings
function renderHub() {
  const p = document.getElementById('hub-grid');
  if(!standings.length) {
    p.innerHTML = '<div class="empty" style="grid-column:1/-1;"><i class="fa-solid fa-circle-notch fa-spin"></i><p>LOADING STANDINGS…</p></div>';
    fetchStandings();
    return;
  }
  const stat = (t,n) => t.stats?.find(s=>s.name===n)?.value ?? '—';
  p.innerHTML = standings.map(grp => {
    const teams = grp.standings?.entries || [];
    return `<div class="grp-card">
      <div class="grp-nm">${grp.name}</div>
      <table class="grp-table">
        <thead><tr><th>#</th><th style="text-align:left;">Club</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead>
        <tbody>${teams.map((t,i) => `<tr>
          <td class="pos">${i+1}</td>
          <td><div class="team-cell"><img src="${t.team.logos?.[0]?.href||''}" onerror="this.style.display='none'"><span>${t.team.displayName}</span></div></td>
          <td>${stat(t,'wins')}</td><td>${stat(t,'ties')}</td><td>${stat(t,'losses')}</td>
          <td class="pts">${stat(t,'points')}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
