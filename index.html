<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KufaTV — FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/* ─── SKEUMORPHIC VARS ─── */
:root{
  --bg: #0a0c10;
  --surface: #12151d;
  --panel: #161a24;
  --panel2: #1c2130;
  --ridge: #252d3e;
  --border: rgba(255,255,255,0.07);
  --glow-gold: #f5c842;
  --glow-red: #ff3b3b;
  --glow-green: #00e676;
  --glow-blue: #4ea7ff;
  --text: #e8ecf4;
  --muted: #5a6680;
  --dim: #8393b0;
  --gold: #f5c842;
  --red: #ff3b3b;
  --green: #00e676;
  --blue: #4ea7ff;

  /* Skeumorphic shadows */
  --raised: 0 1px 0 rgba(255,255,255,0.06) inset, 0 -1px 0 rgba(0,0,0,0.4) inset, 0 4px 12px rgba(0,0,0,0.5);
  --pressed: 0 1px 0 rgba(0,0,0,0.4) inset, 0 -1px 0 rgba(255,255,255,0.04) inset;
  --engraved: inset 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(0,0,0,0.8);
  --screen-glow: 0 0 40px rgba(78,167,255,0.12), 0 0 80px rgba(78,167,255,0.05);
}

body{
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(78,167,255,0.06) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:13px;
  display:flex;
  flex-direction:column;
}

/* ─── TOPBAR ─── */
.topbar{
  height:56px;
  background: linear-gradient(180deg, #1e2434 0%, #141824 100%);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 20px rgba(0,0,0,0.5);
  display:flex;align-items:center;gap:16px;
  padding:0 20px;
  flex-shrink:0;
  z-index:100;
  position:relative;
}

/* Metallic top highlight */
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15) 30%,rgba(255,255,255,0.15) 70%,transparent);
}

.logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Bebas Neue',sans-serif;font-size:26px;
  letter-spacing:2px;
}
.logo-k{
  background:linear-gradient(135deg,#f5c842,#e0901a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-rest{color:var(--text);}
.logo-badge{
  font-size:9px;font-family:'Inter',sans-serif;font-weight:700;
  letter-spacing:1.5px;color:var(--gold);
  background:rgba(245,200,66,0.1);
  border:1px solid rgba(245,200,66,0.3);
  border-radius:3px;padding:2px 6px;
  margin-left:2px;align-self:center;
}

.topbar-nav{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;}
.nav-btn{
  padding:6px 16px;border-radius:6px;
  font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;color:var(--muted);
  border:1px solid transparent;
  background:transparent;
}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nav-btn.active{
  color:var(--gold);
  background:linear-gradient(180deg,rgba(245,200,66,0.12) 0%,rgba(245,200,66,0.06) 100%);
  border:1px solid rgba(245,200,66,0.25);
  box-shadow:0 0 12px rgba(245,200,66,0.1), var(--pressed);
}

.topbar-right{display:flex;align-items:center;gap:10px;}
.live-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,59,59,0.12);
  border:1px solid rgba(255,59,59,0.35);
  border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:800;color:var(--red);letter-spacing:1.5px;
  box-shadow:0 0 10px rgba(255,59,59,0.15);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 4px var(--red);}50%{opacity:0.3;box-shadow:none;}}

.score-ticker{
  height:56px;
  background:linear-gradient(180deg,#101420 0%,#0c0f18 100%);
  border-bottom:1px solid rgba(255,255,255,0.05);
  overflow:hidden;display:flex;align-items:center;
  flex-shrink:0;position:relative;
}
.ticker-label{
  padding:0 14px;font-size:9px;font-weight:800;letter-spacing:2px;
  color:var(--gold);background:rgba(245,200,66,0.08);
  border-right:1px solid rgba(245,200,66,0.2);
  height:100%;display:flex;align-items:center;white-space:nowrap;
  flex-shrink:0;
}
.ticker-track{
  flex:1;overflow:hidden;position:relative;height:100%;display:flex;align-items:center;
}
.ticker-inner{
  display:flex;gap:0;height:100%;align-items:center;
  animation:scroll-ticker 60s linear infinite;
  white-space:nowrap;
}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes scroll-ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-match{
  display:flex;align-items:center;gap:10px;
  padding:0 24px;height:100%;
  border-right:1px solid rgba(255,255,255,0.05);cursor:pointer;
  transition:background 0.15s;
}
.ticker-match:hover{background:rgba(255,255,255,0.04);}
.t-flag{width:20px;height:14px;object-fit:cover;border-radius:1px;border:1px solid rgba(255,255,255,0.1);}
.t-name{font-size:11px;font-weight:600;}
.t-score{
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;
  padding:0 8px;color:var(--text);
}
.t-score.live-score{color:var(--green);text-shadow:0 0 8px rgba(0,230,118,0.4);}
.t-time{font-size:9px;color:var(--red);font-weight:700;}
.t-status-ft{font-size:9px;color:var(--muted);font-weight:600;}

/* ─── MAIN ─── */
.main{flex:1;display:flex;overflow:hidden;}

/* ─── CHANNEL SIDEBAR ─── */
.sidebar{
  width:280px;min-width:240px;
  background:linear-gradient(180deg,#141824 0%,#10131c 100%);
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;overflow:hidden;
  flex-shrink:0;
  box-shadow:4px 0 20px rgba(0,0,0,0.4);
  position:relative;z-index:10;
}
.sidebar::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,0.08) 20%,rgba(255,255,255,0.08) 80%,transparent);
}

.sidebar-head{
  padding:12px 14px 8px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(180deg,rgba(255,255,255,0.03) 0%,transparent);
}
.sidebar-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sidebar-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.ch-count{font-size:10px;color:var(--green);background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);border-radius:10px;padding:1px 7px;font-weight:700;}

.search-wrap{position:relative;}
.ch-search{
  width:100%;background:var(--engraved);background:linear-gradient(180deg,#0a0d14 0%,#0e1118 100%);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:6px;padding:7px 10px 7px 28px;
  font-size:11px;color:var(--text);
  outline:none;font-family:'Inter',sans-serif;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.4);
  transition:border-color 0.2s;
}
.ch-search:focus{border-color:rgba(78,167,255,0.3);box-shadow:inset 0 2px 4px rgba(0,0,0,0.4),0 0 0 2px rgba(78,167,255,0.08);}
.ch-search::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted);pointer-events:none;}

/* Category tabs */
.cat-bar{
  display:flex;gap:4px;padding:8px 10px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  overflow-x:auto;flex-shrink:0;
}
.cat-bar::-webkit-scrollbar{height:0;}
.cat-chip{
  font-size:9px;font-weight:700;letter-spacing:0.5px;
  padding:4px 9px;border-radius:4px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all 0.15s;
}
.cat-chip.active{
  background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.3);color:var(--gold);
  box-shadow:0 0 8px rgba(245,200,66,0.1);
}
.cat-chip:hover:not(.active){border-color:rgba(255,255,255,0.12);color:var(--dim);}

.ch-list{overflow-y:auto;flex:1;}
.ch-list::-webkit-scrollbar{width:3px;}
.ch-list::-webkit-scrollbar-track{background:transparent;}
.ch-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

.ch-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.03);
  transition:all 0.15s;position:relative;
}
.ch-item:hover{background:rgba(255,255,255,0.04);}
.ch-item.active{
  background:linear-gradient(90deg,rgba(78,167,255,0.12) 0%,rgba(78,167,255,0.04) 100%);
  border-left:2px solid var(--blue);
}
.ch-item.active::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:1px;
  background:rgba(78,167,255,0.2);
}
.ch-num{font-size:9px;font-weight:700;color:var(--muted);width:18px;text-align:right;flex-shrink:0;}
.ch-logo-wrap{
  width:36px;height:36px;border-radius:6px;overflow:hidden;flex-shrink:0;
  background:var(--panel2);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
}
.ch-logo{width:100%;height:100%;object-fit:contain;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-cat{font-size:9px;color:var(--muted);margin-top:1px;}
.ch-live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite;flex-shrink:0;}

/* ─── CONTENT AREA ─── */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ─── VIEW PANELS ─── */
.view-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view-panel.active{display:flex;}

/* ─── TV PLAYER ─── */
.player-shell{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:#000;position:relative;
}

/* CRT/TV bezel effect */
.player-bezel{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  background:
    radial-gradient(ellipse 100% 100% at 50% 50%,transparent 85%,rgba(0,0,0,0.6) 100%),
    linear-gradient(rgba(0,0,0,0.04) 50%,rgba(0,0,0,0.04) 50%);
  background-size:100% 100%,100% 3px;
}
.player-area{
  flex:1;position:relative;overflow:hidden;
}
.player-area iframe{
  width:100%;height:100%;border:0;display:block;
}

/* HLS Player */
.hls-player-wrap{
  width:100%;height:100%;position:relative;background:#000;
}
.hls-video{
  width:100%;height:100%;object-fit:contain;display:block;
}
.player-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:rgba(0,0,0,0.85);
}
.player-overlay.hidden{display:none;}
.spinner-ring{
  width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(78,167,255,0.2);
  border-top-color:var(--blue);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay-text{font-size:12px;color:var(--dim);font-weight:500;}

/* Channel info bar */
.ch-info-bar{
  height:54px;flex-shrink:0;
  background:linear-gradient(180deg,#1a1f2e 0%,#141824 100%);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:16px;padding:0 20px;
  box-shadow:0 -1px 0 rgba(255,255,255,0.04) inset;
}
.now-ch-logo{
  width:36px;height:36px;border-radius:6px;overflow:hidden;
  background:var(--panel2);border:1px solid rgba(255,255,255,0.08);
  box-shadow:var(--raised);flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.now-ch-logo img{width:100%;height:100%;object-fit:contain;}
.now-ch-name{font-size:14px;font-weight:700;letter-spacing:0.3px;}
.now-ch-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.bar-spacer{flex:1;}
.ctrl-btn{
  width:34px;height:34px;border-radius:7px;
  background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.02) 100%);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  box-shadow:var(--raised);
  transition:all 0.12s;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.09);box-shadow:var(--raised),0 0 10px rgba(78,167,255,0.1);}
.ctrl-btn:active{box-shadow:var(--pressed);transform:scale(0.96);}
.vol-wrap{display:flex;align-items:center;gap:6px;}
.vol-slider{
  -webkit-appearance:none;width:80px;height:3px;
  border-radius:2px;background:rgba(255,255,255,0.12);outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#2a7eff);
  box-shadow:0 0 6px rgba(78,167,255,0.4);cursor:pointer;
}
.src-select{
  background:linear-gradient(180deg,#0f131e,#0c0f18);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;padding:5px 10px;font-size:10px;
  color:var(--text);font-family:'Inter',sans-serif;cursor:pointer;
  box-shadow:var(--pressed);
}

/* ─── MATCH PANEL ─── */
.match-drawer{
  width:340px;min-width:300px;
  background:linear-gradient(180deg,#141824 0%,#10131c 100%);
  border-left:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;overflow:hidden;
  flex-shrink:0;
  box-shadow:-4px 0 20px rgba(0,0,0,0.3);
}
.drawer-tabs{
  display:flex;border-bottom:1px solid rgba(255,255,255,0.05);
  background:rgba(0,0,0,0.2);flex-shrink:0;
}
.drawer-tab{
  flex:1;padding:11px 0;text-align:center;
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.15s;
}
.drawer-tab.active{color:var(--text);border-color:var(--blue);}
.drawer-tab:hover:not(.active){color:var(--dim);}
.drawer-body{flex:1;overflow-y:auto;}
.drawer-body::-webkit-scrollbar{width:3px;}
.drawer-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);}

/* Match cards */
.match-day-label{
  padding:10px 14px 6px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);
  border-bottom:1px solid rgba(255,255,255,0.04);
  background:rgba(0,0,0,0.15);
}
.match-card{
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;transition:background 0.15s;
  position:relative;
}
.match-card:hover{background:rgba(255,255,255,0.03);}
.match-card.live-card{background:rgba(255,59,59,0.05);}
.match-card.live-card:hover{background:rgba(255,59,59,0.08);}
.mc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mc-stage{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0.5px;}
.mc-status-live{
  font-size:8px;font-weight:800;color:var(--red);letter-spacing:1px;
  display:flex;align-items:center;gap:4px;
}
.mc-status-ft{font-size:8px;font-weight:700;color:var(--muted);}
.mc-status-up{font-size:8px;font-weight:700;color:#5a8fcc;}
.mc-teams{display:flex;align-items:center;gap:6px;}
.mc-team{display:flex;align-items:center;gap:6px;flex:1;}
.mc-team.right{flex-direction:row-reverse;}
.mc-flag{width:20px;height:14px;object-fit:cover;border-radius:1px;border:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.mc-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;}
.mc-score{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  color:var(--text);letter-spacing:2px;text-align:center;
  min-width:44px;flex-shrink:0;
}
.mc-score.is-live{color:var(--green);text-shadow:0 0 8px rgba(0,230,118,0.3);}
.mc-time{font-size:9px;color:var(--muted);margin-top:4px;text-align:center;}
.mc-goals{font-size:9px;color:var(--dim);margin-top:5px;line-height:1.5;}
.mc-goals span{display:inline-block;margin-right:6px;}
.mc-goals .g1{color:#7aaee8;}
.mc-goals .g2{color:#e8907a;}

/* Group standings */
.group-block{margin:0 0 1px;}
.group-head{
  padding:9px 14px;background:rgba(0,0,0,0.2);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;
}
.group-head-name{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.group-table{width:100%;border-collapse:collapse;}
.group-table th{
  font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  color:var(--muted);padding:5px 8px;text-align:right;
  background:rgba(0,0,0,0.1);
}
.group-table th:first-child{text-align:left;padding-left:14px;}
.group-table td{font-size:11px;padding:7px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.03);}
.group-table td:first-child{text-align:left;padding-left:14px;display:flex;align-items:center;gap:6px;}
.group-table tr:last-child td{border-bottom:0;}
.group-table tr:hover td{background:rgba(255,255,255,0.02);}
.qualify{color:var(--green)!important;font-weight:600!important;}
.pts-bold{font-weight:700;color:var(--text)!important;}
.g-flag{width:16px;height:11px;object-fit:cover;border-radius:1px;border:1px solid rgba(255,255,255,0.07);flex-shrink:0;}

/* ─── GLOBAL OVERLAY ─── */
.loading-screen{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at center, #141824 0%, #080c14 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity 0.5s;
}
.loading-screen.fade{opacity:0;pointer-events:none;}
.load-ball{font-size:64px;animation:float 2s ease-in-out infinite alternate;}
@keyframes float{from{transform:translateY(0) rotate(-5deg);}to{transform:translateY(-16px) rotate(5deg);}}
.load-title{
  font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;
  background:linear-gradient(135deg,#f5c842,#e0901a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.load-sub{font-size:12px;color:var(--muted);letter-spacing:1px;}
.load-bar{width:220px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.load-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px;animation:fill 1.8s ease-in-out infinite;}
@keyframes fill{0%{width:0;opacity:1;}70%{width:100%;opacity:1;}100%{width:100%;opacity:0;}}

.toast{
  position:fixed;bottom:20px;right:20px;z-index:300;
  background:linear-gradient(180deg,#1e2434,#161c28);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:10px 16px;
  font-size:12px;font-weight:500;

const DATA_URL='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const GROUPS_URL='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.groups.json';
const CC={
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czech Republic':'cz',
  'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','United States':'us','Paraguay':'py','Australia':'au',
  'Turkey':'tr','Turkiye':'tr','Türkiye':'tr',
  'Germany':'de','Curaçao':'cw','Ivory Coast':'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
  'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa','Czechia':'cz'
};
function flag(n){const c=CC[n];return c?`https://flagcdn.com/w40/${c}.png`:null;}
function flagEl(n,cls='mc-flag'){const s=flag(n);return s?`<img class="${cls}" src="${s}" alt="${n}" onerror="this.style.display='none'">`:`<span style="width:20px;height:14px;background:#1c2130;border-radius:1px;display:inline-block;"></span>`;}

let allMatches=[], allGroups=[], groupStandings={};
let currentDrawerTab='live';
let hlsInstance=null;
let activeChId=null;
let currentCat='All';
let isMuted=false;

// ── TIME UTILS ──
function parseMatchDate(date,time){
  try{
    const[t,tz]=time.split(' ');
    const[h,m]=t.split(':').map(Number);
    const off=parseInt(tz.replace('UTC',''))||0;
    const d=new Date(date+'T00:00:00Z');
    d.setUTCHours(h-off,m,0,0);return d;
  }catch{return new Date(date);}
}
function isLive(m){if(!m._d)return false;const n=Date.now(),s=m._d.getTime();return n>=s&&n<=s+115*60000;}
function isFinished(m){if(!m._d)return false;return Date.now()>m._d.getTime()+115*60000;}
function isToday(m){if(!m._d)return false;return m._d.toDateString()===new Date().toDateString();}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(d){return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── LOAD MATCH DATA ──
async function loadMatchData(){
  const[mr,gr]=await Promise.allSettled([
    fetch(DATA_URL).then(r=>r.json()),
    fetch(GROUPS_URL).then(r=>r.json())
  ]);
  if(mr.status==='fulfilled'){
    allMatches=(mr.value.matches||[]).map((m,i)=>{
      const d=parseMatchDate(m.date,m.time||'00:00 UTC+0');
      const sc=m.score?.ft;
      return{id:i,t1:m.team1||'TBD',t2:m.team2||'TBD',
        date:m.date,_d:d,
        _ds:fmtDate(d),_ts:fmtTime(d),
        round:m.round||'',group:m.group||'',ground:m.ground||'',
        s1:sc?sc[0]:null,s2:sc?sc[1]:null,
        ht:m.score?.ht||null,
        goals1:(m.goals1||[]),goals2:(m.goals2||[])
      };
    });
    computeStandings();
  }
  if(gr.status==='fulfilled'){allGroups=gr.value.groups||[];}
}

function computeStandings(){
  groupStandings={};
  allMatches.forEach(m=>{
    if(!m.group||m.s1===null)return;
    if(!groupStandings[m.group])groupStandings[m.group]={};
    const gs=groupStandings[m.group];
    [m.t1,m.t2].forEach(t=>{if(!gs[t])gs[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    gs[m.t1].p++;gs[m.t2].p++;
    gs[m.t1].gf+=m.s1;gs[m.t1].ga+=m.s2;
    gs[m.t2].gf+=m.s2;gs[m.t2].ga+=m.s1;
    if(m.s1>m.s2){gs[m.t1].w++;gs[m.t1].pts+=3;gs[m.t2].l++;}
    else if(m.s1<m.s2){gs[m.t2].w++;gs[m.t2].pts+=3;gs[m.t1].l++;}
    else{gs[m.t1].d++;gs[m.t1].pts++;gs[m.t2].d++;gs[m.t2].pts++;}
  });
}

// ── SCORE TICKER ──
function buildTicker(){
  const ti=document.getElementById('tickerInner');
  const matches=allMatches.filter(m=>isFinished(m)||isLive(m)||isToday(m)).slice(0,20);
  if(!matches.length){ti.innerHTML='<div style="padding:0 20px;color:var(--muted);font-size:11px;">No matches today · WC 2026 · Jun 11 – Jul 19</div>';return;}
  const html=matches.map(m=>{
    const live=isLive(m),fin=isFinished(m);
    const score=m.s1!==null?`${m.s1} - ${m.s2}`:'vs';
    const f1=flag(m.t1),f2=flag(m.t2);
    const scoreClass=live?'t-score live-score':'t-score';
    const statHtml=live?`<span class="t-time">LIVE</span>`:fin?`<span class="t-status-ft">FT</span>`:`<span class="t-status-ft">${m._ts}</span>`;
    return`<div class="ticker-match" onclick="highlightMatch(${m.id})">
      ${f1?`<img class="t-flag" src="${f1}" alt="${m.t1}">`:''}
      <span class="t-name">${m.t1}</span>
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        <div class="${scoreClass}">${score}</div>
        ${statHtml}
      </div>
      <span class="t-name">${m.t2}</span>
      ${f2?`<img class="t-flag" src="${f2}" alt="${m.t2}">`:''}
    </div>`;
  }).join('');
  // Duplicate for infinite scroll
  ti.innerHTML=html+html;
}

// ── CHANNEL LIST ──
function buildChannelUI(){
  const cats=[...new Set(channelData.map(c=>c.category))];
  const bar=document.getElementById('catBar');
  bar.innerHTML='<div class="cat-chip active" onclick="setCat(\'All\',this)">All</div>';
  cats.forEach(cat=>{
    const el=document.createElement('div');
    el.className='cat-chip';
    el.textContent=cat;
    el.onclick=function(){setCat(cat,this);};
    bar.appendChild(el);
  });
  renderChannels();
}

function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderChannels();
}

function filterChannels(){
  renderChannels();
}

function renderChannels(){
  const q=document.getElementById('chSearch').value.toLowerCase();
  const list=document.getElementById('chList');
  const filtered=channelData.filter(c=>{
    const catOk=currentCat==='All'||c.category===currentCat;
    const qOk=!q||c.name.toLowerCase().includes(q)||c.category.toLowerCase().includes(q);
    return catOk&&qOk;
  });
  document.getElementById('chCount').textContent=filtered.length;
  list.innerHTML=filtered.map(c=>`
    <div class="ch-item${activeChId===c.id?' active':''}" onclick="playChannel('${c.id}')">
      <div class="ch-num">${c.number}</div>
      <div class="ch-logo-wrap"><img class="ch-logo" src="${c.logo}" alt="${c.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 1 1\'><rect fill=\'%231c2130\'/%3E</svg>'"></div>
      <div class="ch-info">
        <div class="ch-name">${c.name}</div>
        <div class="ch-cat">${c.category}</div>
      </div>
      <div class="ch-live-dot"></div>
    </div>`).join('');
}

// ── HLS PLAYER ──
function playChannel(id){
  const ch=channelData.find(c=>c.id===id);
  if(!ch)return;
  activeChId=id;
  renderChannels();

  // Update info bar
  document.getElementById('chInfoBar').style.display='flex';
  document.getElementById('nowName').textContent=ch.name;
  document.getElementById('nowCat').textContent=ch.category+' · HD Live';
  document.getElementById('nowLogo').innerHTML=`<img src="${ch.logo}" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='📺'">`;

  // Hide placeholder
  document.getElementById('playerOverlay').classList.add('hidden');
  document.getElementById('hlsWrap').style.display='block';

  const video=document.getElementById('hlsVideo');
  const overlay=document.getElementById('hlsOverlay');
  const overlayText=document.getElementById('hlsOverlayText');

  // Show loading
  overlay.classList.remove('hidden');
  overlayText.textContent=`Loading ${ch.name}…`;

  // Destroy old HLS
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}

  if(Hls.isSupported()){
    hlsInstance=new Hls({
      enableWorker:true,
      lowLatencyMode:true,
      backBufferLength:30,
    });
    hlsInstance.loadSource(ch.url);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
      video.play().catch(()=>{});
      overlay.classList.add('hidden');
    });
    hlsInstance.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        overlayText.textContent='Stream error — try another channel';
        overlay.classList.remove('hidden');
        showToast('⚠ Stream failed to load');
      }
    });
  }else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=ch.url;
    video.addEventListener('loadedmetadata',()=>{video.play();overlay.classList.add('hidden');},{once:true});
  }

  video.oncanplay=()=>{overlay.classList.add('hidden');};
  video.volume=document.getElementById('volSlider').value;
}

function setVolume(v){
  const video=document.getElementById('hlsVideo');
  if(video){video.volume=parseFloat(v);isMuted=false;document.getElementById('muteBtn').textContent='🔊';}
}
function toggleMute(){
  const video=document.getElementById('hlsVideo');
  if(!video)return;
  isMuted=!isMuted;
  video.muted=isMuted;
  document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';
}
function fullscreen(){
  const video=document.getElementById('hlsVideo');
  if(video){if(video.requestFullscreen)video.requestFullscreen();else if(video.webkitRequestFullscreen)video.webkitRequestFullscreen();}
}

// ── MATCH DRAWER ──
function switchDrawer(tab,el){
  currentDrawerTab=tab;
  document.querySelectorAll('.drawer-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderDrawer();
}

function renderDrawer(){
  const body=document.getElementById('drawerBody');
  if(currentDrawerTab==='groups'){renderDrawerGroups();return;}

  let matches=allMatches;
  if(currentDrawerTab==='live')matches=allMatches.filter(m=>isLive(m));
  else if(currentDrawerTab==='today')matches=allMatches.filter(m=>isToday(m));

  if(!matches.length){
    body.innerHTML=`<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:12px;">${currentDrawerTab==='live'?'No live matches right now':'No matches found'}</div>`;
    return;
  }

  // Group by date
  const byDate={};
  matches.forEach(m=>{
    const k=m._ds;if(!byDate[k])byDate[k]=[];byDate[k].push(m);
  });

  body.innerHTML=Object.entries(byDate).map(([date,ms])=>`
    <div class="match-day-label">${date}</div>
    ${ms.map(m=>{
      const live=isLive(m),fin=isFinished(m);
      const score=m.s1!==null?`${m.s1} : ${m.s2}`:m._ts;
      const scoreClass=live?'mc-score is-live':'mc-score';
      const statEl=live?`<div class="mc-status-live"><div class="live-dot" style="width:5px;height:5px;"></div>LIVE</div>`:
        fin?`<div class="mc-status-ft">FT</div>`:
        `<div class="mc-status-up">${m._ts}</div>`;

      // Goals
      let goalsHtml='';
      if(m.goals1.length||m.goals2.length){
        const g1=m.goals1.map(g=>`<span class="g1">⚽${g.name} ${g.minute}'</span>`).join('');
        const g2=m.goals2.map(g=>`<span class="g2">⚽${g.name} ${g.minute}'</span>`).join('');
        goalsHtml=`<div class="mc-goals">${g1}${g2}</div>`;
      }

      return`<div class="match-card${live?' live-card':''}">
        <div class="mc-header">
          <div class="mc-stage">${m.group||m.round||'—'} · ${m.ground}</div>
          ${statEl}
        </div>
        <div class="mc-teams">
          <div class="mc-team">${flagEl(m.t1)}<span class="mc-name">${m.t1}</span></div>
          <div class="${scoreClass}">${score}</div>
          <div class="mc-team right"><span class="mc-name">${m.t2}</span>${flagEl(m.t2)}</div>
        </div>
        ${goalsHtml}
      </div>`;
    }).join('')}`).join('');
}

function renderDrawerGroups(){
  const body=document.getElementById('drawerBody');
  if(!allGroups.length){body.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);">Loading…</div>';return;}
  body.innerHTML=allGroups.map(g=>{
    const gs=groupStandings[g.name]||{};
    const teams=(g.teams||[]).map(name=>{
      const s=gs[name]||{p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      return{...s,name,gd:s.gf-s.ga};
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    return`<div class="group-block">
      <div class="group-head"><div class="group-head-name">${g.name}</div><div style="font-size:9px;color:var(--muted);">${teams.length} TEAMS</div></div>
      <table class="group-table">
        <thead><tr><th>Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody>${teams.map((t,i)=>`<tr>
          <td class="${i<2?'qualify':''}">
            ${flag(t.name)?`<img class="g-flag" src="${flag(t.name)}" onerror="this.style.display='none'">`:''}
            <span style="font-size:11px;">${t.name}</span>
          </td>
          <td>${t.p}</td>
          <td style="color:${t.gd>0?'var(--green)':t.gd<0?'var(--red)':'var(--muted)'}">${t.gd>0?'+':''}${t.gd}</td>
          <td class="${i<2?'qualify pts-bold':'pts-bold'}">${t.pts}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
}

    </div>`).join('');

// ── MAIN VIEW SWITCH ──
function switchMain(view){
  document.querySelectorAll('.view-panel').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${view}`)?.classList.add('active');
  document.getElementById(`mnav-${view}`)?.classList.add('active');

  if(view==='groups')renderGroupsMain();
}

    await loadMatchData();
    buildTicker();
    renderDrawer();

  },30000); // 30s refresh
}

  buildChannelUI();

  renderDrawer();

  // Auto-select default channel (Caze TV)

  setTimeout(()=>{
    const ls=document.getElementById('loadScreen');

    setTimeout(()=>ls.remove(),600);

  startAutoRefresh();
}

init();
